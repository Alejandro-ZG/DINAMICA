services:
  - type: web
    name: espejo-biblico-api
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: ALLOWED_ORIGINS
        value: https://alejandro-zg.github.io,http://localhost:5500,http://127.0.0.1:5500
      - key: MAX_REQUESTS_PER_WINDOW
        value: 30
