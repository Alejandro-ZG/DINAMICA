services:
  - type: web
    name: dinamica-gemini-api
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3.5-flash
      - key: ALLOWED_ORIGINS
        value: https://alejandro-zg.github.io
      - key: MAX_REQUESTS_PER_WINDOW
        value: 30
